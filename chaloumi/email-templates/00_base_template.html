<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{subject}}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #FBF7F0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .wrapper { max-width: 600px; margin: 0 auto; background: #ffffff; }
    .header { background: #1B3A1C; padding: 24px 32px; text-align: center; }
    .header img { height: 36px; }
    .header-text { color: #ffffff; font-size: 24px; font-family: Georgia, serif; letter-spacing: 2px; }
    .body { padding: 32px; }
    .body h1 { font-family: Georgia, serif; color: #171717; font-size: 24px; margin: 0 0 16px; }
    .body h2 { font-family: Georgia, serif; color: #171717; font-size: 20px; margin: 24px 0 12px; }
    .body p { color: #404040; font-size: 16px; line-height: 1.6; margin: 0 0 16px; }
    .cta { display: inline-block; background: #C8553D; color: #ffffff !important; padding: 14px 32px; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 16px; margin: 8px 0 24px; }
    .cta:hover { background: #A8432F; }
    .divider { border: none; border-top: 1px solid #e5e5e5; margin: 24px 0; }
    .footer { background: #f5f5f5; padding: 24px 32px; text-align: center; }
    .footer p { color: #737373; font-size: 12px; line-height: 1.5; margin: 0 0 8px; }
    .footer a { color: #2C5F2D; }
    .badge { display: inline-block; background: #FBF7F0; border: 1px solid #e5e5e5; border-radius: 8px; padding: 8px 16px; margin: 4px; font-size: 13px; color: #404040; }
    .product-card { border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; margin: 16px 0; }
    .product-card img { width: 100%; height: 200px; object-fit: cover; }
    .product-card-body { padding: 16px; }
    .price { font-size: 24px; font-weight: 700; color: #C8553D; }
    .old-price { text-decoration: line-through; color: #737373; font-size: 14px; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="header-text">CHALOUMI</div>
    </div>
    <div class="body">
      {{content}}
    </div>
    <div class="footer">
      <p>CHALOUMI — Fromage artisanal de Chypre</p>
      <p>100% lait de chevre | Fabrique a la main | Livre en 48h</p>
      <hr class="divider">
      <p><a href="{{unsubscribe_url}}">Se desabonner</a> | <a href="{{preferences_url}}">Preferences</a></p>
      <p>&copy; 2026 CHALOUMI. Tous droits reserves.</p>
    </div>
  </div>
</body>
</html>
